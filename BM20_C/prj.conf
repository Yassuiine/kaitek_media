CONFIG_SPI=y
CONFIG_SPI_SLAVE=y
CONFIG_GPIO=y
CONFIG_I2S=y
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y

# Bring-up/debug profile first. Re-enable PM once SPI link is validated.
CONFIG_PM=n
CONFIG_PM_DEVICE=n
CONFIG_PM_DEVICE_RUNTIME=n

CONFIG_ASSERT=y
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Zephyr shell owns UART20. Logs go to RTT, not the shell UART.
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="kaitek> "
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SHELL_LOG_BACKEND=n
CONFIG_SHELL_ECHO_STATUS=y
# VT100 commands ON so backspace visually erases the typed char
# (cursor-move/erase is gated behind this Kconfig). Colors stay off.
CONFIG_SHELL_VT100_COMMANDS=y
CONFIG_SHELL_VT100_COLORS=n
CONFIG_SHELL_BACKEND_SERIAL_FORCE_TX_BLOCKING_MODE=y

CONFIG_REBOOT=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_PER_ADV_SYNC=y
CONFIG_BT_CTLR_PHY_CODED=y
CONFIG_BT_EXT_ADV_CODING_SELECTION=y
CONFIG_BT_DEVICE_NAME="BM20_C Periodic Advertising Sync"
