CONFIG_SPI=y
CONFIG_SPI_SLAVE=y
CONFIG_GPIO=y
CONFIG_I2S=y
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y

# Bring-up/debug profile first. Re-enable PM once SPI link is validated.
CONFIG_PM=n
CONFIG_PM_DEVICE=n
CONFIG_PM_DEVICE_RUNTIME=n

CONFIG_ASSERT=y
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
# Keep UARTE20 powered on between transfers — low-power mode disables the
# peripheral after every TX, causing a ~14-byte startup glitch on re-enable.
CONFIG_UART_20_NRF_ASYNC_LOW_POWER=n

CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_PER_ADV_SYNC=y
CONFIG_BT_CTLR_PHY_CODED=y
CONFIG_BT_EXT_ADV_CODING_SELECTION=y
CONFIG_BT_DEVICE_NAME="BM20_C Periodic Advertising Sync"

# Route console/log output over SEGGER RTT. The KAIMA debug card sends its own
# whole-line hardware UART messages on the extension connector.
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
